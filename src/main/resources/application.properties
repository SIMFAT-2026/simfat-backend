spring.application.name=simfat-backend
server.port=${SERVER_PORT:8080}

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/simfat}

app.cors.frontend-url=${FRONTEND_URL:http://localhost:3000,http://localhost:4173}
app.forest.default-reference-hectares=${DEFAULT_REFERENCE_HECTARES:100000}
app.alert.default-loss-threshold=${DEFAULT_LOSS_THRESHOLD:1.0}
app.alert.default-heat-events-threshold=${DEFAULT_HEAT_EVENTS_THRESHOLD:5}
