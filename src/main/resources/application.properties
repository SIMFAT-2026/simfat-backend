spring.application.name=simfat-backend
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}

spring.datasource.url=${POSTGRES_URI:jdbc:postgresql://localhost:5432/simfat}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/simfat}
spring.data.mongodb.auto-index-creation=true

app.cors.frontend-url=${FRONTEND_URL:http://localhost:3000,http://localhost:4173}
app.forest.default-reference-hectares=${DEFAULT_REFERENCE_HECTARES:100000}
app.alert.default-loss-threshold=${DEFAULT_LOSS_THRESHOLD:1.0}
app.alert.default-heat-events-threshold=${DEFAULT_HEAT_EVENTS_THRESHOLD:5}
app.seed.enabled=${APP_SEED_ENABLED:true}

openeo.service.base-url=${OPENEO_SERVICE_BASE_URL:http://localhost:8000}
openeo.service.timeout-ms=${OPENEO_SERVICE_TIMEOUT_MS:8000}
openeo.sync.enabled=${OPENEO_SYNC_ENABLED:true}
openeo.sync.cron=${OPENEO_SYNC_CRON:0 */15 * * * *}
openeo.sync.placeholder-value-enabled=${OPENEO_SYNC_PLACEHOLDER_VALUE_ENABLED:false}
openeo.sync.min-request-interval-minutes=${OPENEO_SYNC_MIN_REQUEST_INTERVAL_MINUTES:0}
openeo.aoi.bbox-map=${OPENEO_AOI_BBOX_MAP:}
openeo.ingest.auth-token=${OPENEO_INGEST_AUTH_TOKEN:}

auth.jwt.secret=${AUTH_JWT_SECRET}
auth.jwt.access-ttl-minutes=${AUTH_JWT_ACCESS_TTL_MINUTES:15}
auth.jwt.refresh-ttl-days=${AUTH_JWT_REFRESH_TTL_DAYS:14}
auth.jwt.issuer=${AUTH_JWT_ISSUER:simfat-backend}

auth.turnstile.enabled=${AUTH_TURNSTILE_ENABLED:false}
auth.turnstile.secret-key=${AUTH_TURNSTILE_SECRET_KEY:disabled}
auth.turnstile.verify-url=${AUTH_TURNSTILE_VERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}

auth.rate-limit.login.max-attempts=${AUTH_RATE_LIMIT_LOGIN_MAX_ATTEMPTS:5}
auth.rate-limit.login.window-seconds=${AUTH_RATE_LIMIT_LOGIN_WINDOW_SECONDS:300}
auth.rate-limit.forgot-password.max-attempts=${AUTH_RATE_LIMIT_FORGOT_MAX_ATTEMPTS:5}
auth.rate-limit.forgot-password.window-seconds=${AUTH_RATE_LIMIT_FORGOT_WINDOW_SECONDS:600}

auth.password-reset.ttl-minutes=${AUTH_PASSWORD_RESET_TTL_MINUTES:30}

app.storage.supabase.enabled=${APP_STORAGE_SUPABASE_ENABLED:false}
app.storage.supabase.url=${SUPABASE_URL:}
app.storage.supabase.service-key=${SUPABASE_SERVICE_ROLE_KEY:}
app.storage.supabase.bucket=${SUPABASE_STORAGE_BUCKET:citizen-reports}
app.storage.local.enabled=${APP_STORAGE_LOCAL_ENABLED:true}
app.storage.local.base-dir=${APP_STORAGE_LOCAL_DIR:tmp/uploads/citizen-reports}
app.storage.local.public-base-path=${APP_STORAGE_LOCAL_PUBLIC_BASE_PATH:/uploads/citizen-reports}
